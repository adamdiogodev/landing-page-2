
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talently | Smarter Hiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-purple: #9333ea;
        --brand-purple-glow: rgba(147, 51, 234, 0.2);
        --brand-dark: #000000;
        --bg-mesh: radial-gradient(at 0% 0%, rgba(245, 243, 255, 0.7) 0, transparent 60%), 
                   radial-gradient(at 100% 0%, rgba(236, 253, 245, 0.7) 0, transparent 60%),
                   radial-gradient(at 100% 100%, rgba(255, 241, 242, 0.7) 0, transparent 60%),
                   radial-gradient(at 0% 100%, rgba(240, 253, 250, 0.7) 0, transparent 60%);
      }
      body {
        font-family: 'Geist', sans-serif;
        background-color: #ffffff;
        background-image: var(--bg-mesh);
        color: #1e293b;
        overflow-x: hidden;
        background-attachment: fixed;
      }
      
      .btn-talk {
        background: #000;
        color: #fff;
        padding: 10px 24px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
      }
      .btn-talk:hover {
        transform: scale(1.02);
        background: #1a1a1a;
      }

      .btn-get-started {
        background: linear-gradient(90deg, #c026d3, #9333ea);
        color: white;
        padding: 16px 40px;
        border-radius: 18px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        box-shadow: 0 10px 20px var(--brand-purple-glow);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-get-started:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px var(--brand-purple-glow);
      }

      .btn-learn-more {
        background: #000;
        color: white;
        padding: 16px 40px;
        border-radius: 18px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-learn-more:hover {
        transform: translateY(-2px);
        background: #1a1a1a;
      }

      .floating-card {
        background: white;
        border-radius: 24px;
        padding: 16px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.05), 0 0 1px rgba(0,0,0,0.1);
        border: 1px solid rgba(0,0,0,0.02);
      }

      .nav-pill {
        background: #f1f5f9;
        padding: 8px 20px;
        border-radius: 99px;
        font-weight: 500;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .headline-main {
        font-size: clamp(2.5rem, 8vw, 6rem);
        line-height: 1.05;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #0f172a;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 4px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "framer-motion": "https://esm.sh/framer-motion@^12.33.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
